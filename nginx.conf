worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  gzip on;
  gzip_vary on;
  gzip_min_length 256;
  gzip_proxied any;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/x-javascript
    application/xml
    application/json
    application/ld+json
    image/svg+xml
    application/wasm;

  # Map request URI to cache policy:
  #   "immutable" for Vite hashed assets
  #   "nocache"   for HTML and service worker files
  map $uri $cache_control {
    default                          "no-cache";
    ~*\.(js|css|woff2?|png|svg|ico|webp|wasm)$  "public, max-age=31536000, immutable";
  }

  server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # Single add_header at server level – avoids location-block inheritance issues
    add_header Cache-Control $cache_control;

    # Security headers (DAST findings)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; form-action 'none'; base-uri 'self';" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}
