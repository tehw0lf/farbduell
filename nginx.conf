worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;

  gzip on;
  gzip_vary on;
  gzip_min_length 256;
  gzip_proxied any;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/x-javascript
    application/xml
    application/json
    application/ld+json
    image/svg+xml
    application/wasm;

  server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # Service worker and HTML: always revalidate so PWA updates propagate immediately
    location ~* \.(html)$ {
      add_header Cache-Control "no-cache";
    }
    location ~* ^/(sw\.js|workbox-[^/]+\.js)$ {
      add_header Cache-Control "no-cache";
    }

    # Vite hashed assets: immutable for one year
    location ~* \.(js|css|woff2?|png|svg|ico|webp|wasm)$ {
      add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}
